name: "Unhide"
philosophy: "Warm tactile luxury. A cashmere blanket folded on a linen sofa — premium restraint meets cozy approachability. Serif headlines breathe softness into structured layouts, while olive-gold accents whisper rather than shout."
primary_mode: "light"
brand_domain: "luxury home comfort / blankets & textiles"
brand_type: "content-rich"
mono_for_code: false
mono_for_metrics: false

# ── PRIMITIVES ── Raw scales derived from brand analysis
primitives:
  colors:
    neutral:    # Warm cream-tinted grays matching brand's FAF7F0 canvas
      50: "#FAF7F0"
      100: "#F4F0E7"
      200: "#EBE1D0"
      300: "#DADACA"
      400: "#AAA494"
      500: "#7A756A"
      600: "#5C5850"
      700: "#45413B"
      800: "#2E2B27"
      900: "#1E1E1E"
      950: "#121110"
    brand:      # Olive-gold, 500 = dark olive CTA
      50: "#F7F3EB"
      100: "#EDE5D3"
      200: "#DBC9A5"
      300: "#C6AD78"
      400: "#B59C63"
      500: "#665C34"
      600: "#57502E"
      700: "#474226"
      800: "#38341E"
      900: "#2A2717"
      950: "#1C1A10"
    red:   { 50: "#FEF2EF", 500: "#B4463E", 900: "#5C2320" }
    green: { 50: "#EEF7F6", 500: "#11998E", 900: "#0A4D47" }
    amber: { 50: "#FFF8EB", 500: "#D4A843", 900: "#6A5422" }
  spacing: [0, 2, 4, 8, 12, 16, 24, 32, 40, 48, 64, 80, 96, 160]
  radii: [0, 4, 5, 10, 40, 999]

# ── SEMANTIC TOKENS ── Roles that reference primitives
tokens:
  colors:
    light:
      background: "{neutral.50}"       # #FAF7F0
      surface1: "#FFFFFF"
      surface2: "{neutral.100}"        # #F4F0E7
      surface3: "{neutral.200}"        # #EBE1D0
      border: "{neutral.200}"          # #EBE1D0
      border_visible: "{neutral.300}"  # #DADACA
      text1: "{neutral.900}"           # #1E1E1E
      text2: "{neutral.600}"           # #5C5850
      text3: "{neutral.500}"           # #7A756A
      text4: "{neutral.400}"           # #AAA494
      accent: "{brand.500}"            # #665C34
      accent_subtle: "{brand.50}"      # #F7F3EB
      accent_secondary: "{brand.400}"  # #B59C63
    dark:
      background: "{neutral.950}"      # #121110
      surface1: "{neutral.900}"        # #1E1E1E
      surface2: "{neutral.800}"        # #2E2B27
      surface3: "{neutral.700}"        # #45413B
      border: "{neutral.800}"          # #2E2B27
      border_visible: "{neutral.700}"  # #45413B
      text1: "{neutral.50}"            # #FAF7F0
      text2: "{neutral.400}"           # #AAA494
      text3: "{neutral.500}"           # #7A756A
      text4: "{neutral.600}"           # #5C5850
      accent: "{brand.400}"            # #B59C63
      accent_subtle: "{brand.950}"     # #1C1A10
      accent_secondary: "{brand.300}"  # #C6AD78
    success: "{green.500}"
    warning: "{amber.500}"
    error: "{red.500}"

  spacing:
    2xs: 2
    xs: 4
    sm: 8
    md: 16
    lg: 24
    xl: 32
    2xl: 48
    3xl: 64
    4xl: 96

  radii:
    element: 4
    control: 5
    component: 5
    container: 10
    pill: 40
    full: 999

  typography:
    display: { family: "Cormorant Garamond", size: "60px", weight: 400, line_height: 1.0, letter_spacing: "-0.03em", style: "italic" }
    h1: { family: "Cormorant Garamond", size: "42px", weight: 400, line_height: 1.1, letter_spacing: "-0.03em" }
    h2: { family: "Cormorant Garamond", size: "32px", weight: 400, line_height: 1.15, letter_spacing: "-0.02em" }
    h3: { family: "Cormorant Garamond", size: "24px", weight: 500, line_height: 1.2, letter_spacing: "-0.02em" }
    body: { family: "Nunito Sans", size: "16px", weight: 400, line_height: 1.5, letter_spacing: "-0.01em" }
    body_sm: { family: "Nunito Sans", size: "14px", weight: 400, line_height: 1.4, letter_spacing: "-0.005em" }
    caption: { family: "Nunito Sans", size: "12px", weight: 400, line_height: 1.3, letter_spacing: "0em" }
    label: { family: "Nunito Sans", size: "11px", weight: 500, line_height: 1.2, letter_spacing: "0.02em" }
    mono: { family: "DM Mono", size: "13px", weight: 400 }

  elevation:
    strategy: "flat"
    card: "none"
    hover: "0 2px 8px rgba(30, 30, 30, 0.06)"
    overlay: "0 8px 32px rgba(30, 30, 30, 0.12)"

  motion:
    personality: "smooth"
    easing: "cubic-bezier(.36, .07, .19, .97)"
    duration_fast: "100ms"
    duration_normal: "200ms"
    duration_long: "500ms"

  hero_stage:
    preset: "editorial-photo"
    observed_style:
      description: "Full-bleed lifestyle photography — mother and daughter on a couch wrapped in blankets, warm natural lighting, cozy domestic scenes. Large italic serif headline overlaid. White CTA button with dark border."
      where_used: ["hero", "category banners", "feature sections"]
    background:
      medium: "photo"
      color_mode: "palette"
      saturation: "muted"
      light_source: "ambient"
      falloff: "soft"
      vignette: "off"
      texture: "clean"
      motion: "static"
      intensity: "subtle"
      safe_zone: "full-bleed"
      color_palette: ["#FAF7F0", "#665C34", "#B59C63", "#C6B59C", "#1E1E1E"]
    hero:
      subject: "none"
      placement: "center"
      scale: "balanced"
      tint: "neutral"
    relation:
      type: "flat"
      bleed: 0
    disclaimer: "Hero uses editorial lifestyle photography. Rendered as warm gradient placeholder — real brand uses commissioned photography not redistributed with this skill."

  iconography:
    observed_style:
      description: "Minimal icons — thin stroke search icon, cart icon, account icon in the header. Very simple, functional, not decorative. The brand relies on photography over iconography."
      stroke_weight: "thin"
      corner_treatment: "soft"
      fill_style: "outline"
      form_language: "humanist"
      visual_density: "minimal"
    fallback_kit:
      name: "Phosphor"
      weight: "thin"
      match_score: "high"
      match_reasoning: "Phosphor thin matches the observed thin-stroke (~1px), soft-terminal, humanist icon style. The brand barely uses icons — they're functional wayfinding only. Phosphor thin's delicate weight won't compete with the photography-first aesthetic. Iconoir would be second choice but its 2px stroke is heavier than observed."
      cdn: "https://unpkg.com/@phosphor-icons/web@2/src/thin/style.css"
      icon_class_prefix: "ph-thin ph-"
    disclaimer: "Icons in the generated preview are a best-match fallback from the Phosphor thin kit. The brand's actual icons are custom and minimal."

components:
  button_primary:
    source: "observed"
    background: "{brand.500}"
    color: "#FFFFFF"
    padding: "15px 50px"
    radius: "{radii.control}"
    font_weight: 500
    font_size: "18px"
    border: "1px solid {brand.500}"
    hover: { background: "{brand.600}" }

  button_secondary:
    source: "observed"
    background: "#FFFFFF"
    color: "{neutral.900}"
    padding: "12px 24px"
    radius: "{radii.control}"
    font_weight: 500
    font_size: "18px"
    border: "1px solid {neutral.900}"
    hover: { background: "{neutral.100}" }

  button_dark:
    source: "observed"
    background: "{neutral.900}"
    color: "#FFFFFF"
    padding: "15px 50px"
    radius: "{radii.control}"
    font_weight: 500
    font_size: "18px"
    border: "1px solid {neutral.900}"
    hover: { background: "{neutral.800}" }

  card_product:
    source: "observed"
    background: "#FFFFFF"
    radius: "{radii.element}"
    padding: "8px 8px 15px"
    border: "none"
    shadow: "none"
    image_radius: "{radii.element}"

  badge:
    source: "observed"
    background: "#E2E05D"
    color: "#000000"
    radius: "{radii.pill}"
    padding: "6px 16px"
    font_size: "14px"

  badge_teal:
    source: "observed"
    background: "{green.500}"
    color: "#FFFFFF"
    radius: "{radii.element}"
    padding: "3px 8px"
    font_size: "12px"

  input_email:
    source: "observed"
    background: "transparent"
    border_bottom: "1px solid {neutral.900}"
    radius: "0px"
    padding: "8px 0"
    font_size: "16px"

  announcement_bar:
    source: "observed"
    background: "{brand.500}"
    color: "#FFFFFF"
    padding: "10px 16px"
    font_size: "14px"

  nav_header:
    source: "observed"
    background: "{neutral.50}"
    border_bottom: "none"
    padding: "16px 24px"
    font_family: "Cormorant Garamond"
    font_size: "20px"

  color_swatch:
    source: "observed"
    width: "28px"
    height: "28px"
    radius: "50%"
    border: "1px solid {neutral.300}"

  size_selector:
    source: "observed"
    padding: "8px 16px"
    radius: "{radii.element}"
    border: "1px solid {neutral.300}"
    font_size: "14px"
    selected_border: "1px solid {neutral.900}"

  star_rating:
    source: "observed"
    color: "{brand.400}"
    size: "14px"

  footer:
    source: "observed"
    background: "{neutral.50}"
    border_top: "1px solid {neutral.200}"
    padding: "90px 0 10px"
